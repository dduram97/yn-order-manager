# YN Order Manager — Nginx production sample
#
# 설치:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/yn-order
#   sudo ln -sf /etc/nginx/sites-available/yn-order /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d yourdomain.com -d api.yourdomain.com
#
# yourdomain.com     → 127.0.0.1:3000 (Next.js)
# api.yourdomain.com → 127.0.0.1:4000 (Aligo VPS API — Vercel ALIGO_API_URL)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream yn_next {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream yn_aligo_api {
    server 127.0.0.1:4000;
    keepalive 8;
}

# ── HTTP → HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com api.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Next.js (메인 SaaS UI) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    client_max_body_size 10m;

    location /_next/static/ {
        proxy_pass http://yn_next;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location /icons/ {
        proxy_pass http://yn_next;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://yn_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}

# ── Aligo API (Vercel → VPS) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://yn_aligo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
